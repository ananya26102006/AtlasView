<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasView Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌍 AtlasView 🌏</h1>
        <button id="themeToggle">🌙 Toggle Theme</button>
    </header>

    <section class="controls">
        <input type="text" id="searchInput" placeholder="Search Country...">

        <select id="regionFilter">
            <option value="all">All Regions</option>
            <option value="Africa">Africa</option>
            <option value="Americas">Americas</option>
            <option value="Asia">Asia</option>
            <option value="Europe">Europe</option>
            <option value="Oceania">Oceania</option>
        </select>

        <select id="sortOption">
            <option value="default">Sort By</option>
            <option value="nameAsc">Name A-Z</option>
            <option value="populationAsc">Population Low-High</option>
            <option value="populationDesc">Population High-Low</option>
        </select>
    </section>

    <p id="loading">Loading countries...</p>

    <section id="countries-container"></section>

    <script src="script.js"></script>
</body>
</html>
